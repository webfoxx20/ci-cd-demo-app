# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
  pull_request:
    branches:
      - "master"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests
        run: mvn -B test --file pom.xml

      - name: Build app
        run: mvn -B package --file pom.xml -DskipTests  # ← add -DskipTests
        #   tests already ran above

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/webserver-0.0.1-SNAPSHOT.jar

      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6

  push_image_to_docker:
    runs-on: ubuntu-latest
    needs: build                         # ← only runs if build passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/webserver-app:${{ env.SHORT_SHA }}
            ${{ vars.DOCKERHUB_USERNAME }}/webserver-app:latest  # ← added back

  deploy_to_k8s:
    runs-on: ubuntu-latest
    needs: push_image_to_docker          # ← only runs if docker job passes

    steps:
      - name: Checkout manifests repo
        uses: actions/checkout@v4
        with:
          repository: twentyszn/k8s-manifests    # ← your manifests repo
          token: ${{ secrets.REPO_TOKEN }}          # ← your GitHub token

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Update image tag in values.yaml
        run: |
          sed -i "s|tag:.*|tag: ${{ env.SHORT_SHA }}|g" webserver-app/values.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add webserver-app/values.yaml
          git commit -m "Update image tag to ${{ env.SHORT_SHA }}"
          git push